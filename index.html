<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerseFlow - Daily Word</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-teal: #7FB3B3;
            --dark-overlay: rgba(0, 0, 0, 0.5);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --text-sub: #555;
            --modal-bg: #ffffff;
            --bg-outer: #121212;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --card-bg: rgba(30, 30, 30, 0.95);
            --text-main: #f5f5f5;
            --text-sub: #ccc;
            --modal-bg: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        body, html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-outer);
        }

        /* Responsive Container for Mac/Windows */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .app-container {
                max-width: 412px;
                height: 90vh;
                max-height: 850px;
                border-radius: 36px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            }
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-overlay); z-index: 1;
        }

        .content {
            position: relative; z-index: 2; height: 100%;
            display: flex; flex-direction: column; padding: 20px;
            justify-content: space-between;
        }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; color: white; padding-top: 10px;}
        .icon-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
        
        .streak-pill {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px; border-radius: 20px;
            font-weight: bold; font-size: 14px; backdrop-filter: blur(5px);
        }

        /* Verse Container */
        .verse-container { text-align: center; margin: auto 0; padding: 20px; color: white;}
        .verse-text { font-family: "Georgia", serif; font-size: 24px; line-height: 1.4; margin-bottom: 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .verse-ref { font-size: 18px; font-weight: 600; color: #FFD580; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* Customization Panel */
        .controls-panel {
            background: var(--card-bg); border-radius: 24px; padding: 16px;
            margin-bottom: 12px; transition: background 0.3s;
        }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .control-row:last-child { margin-bottom: 0; }
        .control-label { font-size: 14px; font-weight: 600; color: var(--text-main); }
        
        select {
            padding: 6px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; background: var(--modal-bg); color: var(--text-main); outline: none;
        }

        .bg-thumbnails { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;}
        .bg-thumb {
            min-width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; background-size: cover;
        }
        .bg-thumb.active { border-color: var(--primary-teal); }

        /* Action Buttons */
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;}
        .action-btn {
            background: var(--primary-teal); border: none; padding: 14px; border-radius: 16px;
            color: white; font-weight: 600; font-size: 15px; cursor: pointer; display: flex;
            justify-content: center; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.secondary { background: #4A6B6B; }

        /* Settings Modal */
        .modal {
            position: absolute; bottom: -100%; left: 0; right: 0; height: 40%;
            background: var(--modal-bg); color: var(--text-main);
            border-top-left-radius: 32px; border-top-right-radius: 32px; z-index: 10;
            padding: 24px; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }
        .modal.open { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--text-sub); padding-bottom: 10px; }
        .modal-close { font-size: 28px; cursor: pointer; color: var(--text-sub); }
        .list-item { padding: 12px 0; display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>

    <div class="app-container" id="appBg" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=500&q=80');">
        <div class="overlay"></div>
        
        <div class="content">
            <div class="header">
                <button class="icon-btn" onclick="openModal('settingsModal')"><i class="fas fa-gear"></i></button>
                <div class="streak-pill"><i class="fas fa-fire" style="color:#FFA500"></i> <span id="streakCount">1</span> Day Streak</div>
                <div style="width: 38px;"></div> </div>

            <div class="verse-container">
                <p class="verse-text" id="verseDisplay">"I have told you these things, so that in me you may have peace. In this world you will have trouble. But take heart! I have overcome the world."</p>
                <p class="verse-ref" id="referenceDisplay">John 16:33 (CSB)</p>
            </div>

            <div>
                <div class="controls-panel">
                    <div class="control-row">
                        <span class="control-label">Translation</span>
                        <select id="translationSelect" onchange="updateTranslation()">
                            <option value="CSB">CSB</option>
                            <option value="NIV">NIV</option>
                            <option value="ESV">ESV</option>
                            <option value="KJV">KJV</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <span class="control-label">Backgrounds</span>
                        <div class="bg-thumbnails">
                            <div class="bg-thumb active" style="background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=80&q=80');" onclick="changeBackground(this, 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=500&q=80')"></div>
                            <div class="bg-thumb" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=80&q=80');" onclick="changeBackground(this, 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=500&q=80')"></div>
                            <div class="bg-thumb" style="background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=80&q=80');" onclick="changeBackground(this, 'https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=500&q=80')"></div>
                            <div class="bg-thumb" style="background-image: url('https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?auto=format&fit=crop&w=80&q=80');" onclick="changeBackground(this, 'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?auto=format&fit=crop&w=500&q=80')"></div>
                        </div>
                    </div>
                </div>

                <div class="actions-grid">
                    <button class="action-btn" onclick="shareNative()"><i class="fas fa-arrow-up-from-bracket"></i> Share</button>
                    <button class="action-btn secondary" onclick="enableNotifications()"><i class="fas fa-bell"></i> Remind</button>
                </div>
            </div>
        </div>

        <div class="modal" id="settingsModal">
            <div class="modal-header">
                <h2>Settings</h2>
                <span class="modal-close" onclick="closeModal('settingsModal')">&times;</span>
            </div>
            <div class="list-item">
                <strong>Dark Mode</strong>
                <button style="padding:6px 12px; border-radius:8px; border:1px solid #ccc; cursor:pointer; background: var(--card-bg); color: var(--text-main);" onclick="toggleDarkMode()">Toggle Theme</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Fully Working Translations
        const versesData = {
            CSB: { text: '"I have told you these things, so that in me you may have peace. In this world you will have trouble. But take heart! I have overcome the world."', ref: 'John 16:33' },
            NIV: { text: '"I have told you these things, so that in me you may have peace. In this world you will have trouble. But take heart! I have overcome the world."', ref: 'John 16:33' },
            ESV: { text: '"I have said these things to you, that in me you may have peace. In the world you will have tribulation. But take heart; I have overcome the world."', ref: 'John 16:33' },
            KJV: { text: '"These things I have spoken unto you, that in me ye might have peace. In the world ye shall have tribulation: but be of good cheer; I have overcome the world."', ref: 'John 16:33' }
        };

        function updateTranslation() {
            const selected = document.getElementById('translationSelect').value;
            document.getElementById('verseDisplay').innerText = versesData[selected].text;
            document.getElementById('referenceDisplay').innerText = `${versesData[selected].ref} (${selected})`;
        }

        // 2. Fully Working Background Swapper
        function changeBackground(element, imgUrl) {
            document.getElementById('appBg').style.backgroundImage = `url('${imgUrl}')`;
            document.querySelectorAll('.bg-thumb').forEach(thumb => thumb.classList.remove('active'));
            element.classList.add('active');
        }

        // 3. Fully Working Native Share
        function shareNative() {
            const verse = document.getElementById('verseDisplay').innerText;
            const ref = document.getElementById('referenceDisplay').innerText;
            if (navigator.share) {
                navigator.share({ title: 'VerseFlow', text: `${verse}\n- ${ref}`, url: window.location.href });
            } else {
                alert("Your device does not support native sharing, but here is the verse:\n\n" + verse + " - " + ref);
            }
        }

        // 4. Fully Working Modals & Dark Mode
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            // Save preference to local storage
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('verseFlowTheme', isDark ? 'dark' : 'light');
        }

        // Load saved theme on startup
        if (localStorage.getItem('verseFlowTheme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // 5. Fully Working Web Notifications Requester
        function enableNotifications() {
            if (!("Notification" in window)) {
                alert("This browser does not support desktop notification");
            } else if (Notification.permission === "granted") {
                alert("Notifications are already enabled!");
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("VerseFlow Reminders", { body: "You will now receive daily reminders." });
                    }
                });
            }
        }

        // 6. Fully Working Real-Time Date Streak Logic
        function calculateStreak() {
            const today = new Date().toLocaleDateString();
            let lastOpened = localStorage.getItem('verseFlowLastOpened');
            let currentStreak = parseInt(localStorage.getItem('verseFlowStreak')) || 0;

            if (lastOpened !== today) {
                if (lastOpened) {
                    const lastDate = new Date(lastOpened);
                    const currentDate = new Date(today);
                    const diffTime = Math.abs(currentDate - lastDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                    if (diffDays === 1) {
                        currentStreak += 1; // Logged in consecutively
                    } else {
                        currentStreak = 1; // Missed a day, reset streak
                    }
                } else {
                    currentStreak = 1; // First time opening the app
                }

                // Save new data
                localStorage.setItem('verseFlowLastOpened', today);
                localStorage.setItem('verseFlowStreak', currentStreak);

                // Confetti for milestones!
                if (currentStreak === 10 || currentStreak === 50 || currentStreak === 100) {
                    setTimeout(() => {
                        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                    }, 500);
                }
            }

            // Display the streak
            document.getElementById('streakCount').innerText = currentStreak;
        }

        // Run streak calculation as soon as app loads
        window.onload = calculateStreak;
    </script>
</body>
</html>
